<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <!-- ═══════════════════════════════════════════
         VIEWPORT & PWA BASE
    ════════════════════════════════════════════ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#d4a84b" />
    <meta name="color-scheme" content="dark" />

    <!-- ═══════════════════════════════════════════
         SEO & DESCRIPTION
    ════════════════════════════════════════════ -->
    <title>NOVA — Guide de Conscience</title>
    <meta name="description" content="NOVA est ton guide spirituel et psychologique personnel. Méditation, accompagnement intérieur, éveil de la conscience." />
    <meta name="keywords" content="méditation, spiritualité, conscience, éveil, psychologie, bien-être" />
    <meta name="author" content="NOVA by Cœur & Co" />

    <!-- ═══════════════════════════════════════════
         OPEN GRAPH (partage réseaux sociaux)
    ════════════════════════════════════════════ -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nova.coeurandco.com/" />
    <meta property="og:title" content="NOVA — Guide de Conscience" />
    <meta property="og:description" content="Ton guide spirituel et psychologique personnel." />
    <meta property="og:image" content="https://nova.coeurandco.com/icons/icon-512x512.png" />

    <!-- ═══════════════════════════════════════════
         iOS / APPLE PWA
    ════════════════════════════════════════════ -->
    <!-- Permet l'installation sur l'écran d'accueil iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NOVA" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Icônes Apple (iOS ne lit pas le manifest pour les icônes) -->
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png" />

    <!-- Splash screens iOS (iPhone 14 Pro, 13, 12, SE...) -->
    <!-- iPhone 14 Pro Max -->
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)"
      href="/icons/splash-1290x2796.png" />
    <!-- iPhone 14 Pro -->
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)"
      href="/icons/splash-1179x2556.png" />
    <!-- iPhone 14 / 13 / 12 -->
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)"
      href="/icons/splash-1170x2532.png" />
    <!-- iPhone SE -->
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)"
      href="/icons/splash-750x1334.png" />

    <!-- ═══════════════════════════════════════════
         MANIFEST PWA
    ════════════════════════════════════════════ -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ═══════════════════════════════════════════
         FAVICONS
    ════════════════════════════════════════════ -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96x96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-72x72.png" />

    <!-- ═══════════════════════════════════════════
         ENREGISTREMENT DU SERVICE WORKER
         (inline ici en fallback — vite-plugin-pwa
          l'injecte automatiquement en production)
    ════════════════════════════════════════════ -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[NOVA] Service Worker enregistré :', reg.scope))
            .catch(err => console.warn('[NOVA] Erreur SW :', err));
        });
      }
    </script>

    <!-- Empêcher le zoom accidentel sur double-tap (iOS) -->
    <style>
      * { -webkit-tap-highlight-color: transparent; }
      body { -webkit-text-size-adjust: 100%; }
      /* Safe area pour l'encoche / Dynamic Island */
      #root {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
